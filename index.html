<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>INDDIA ERP</title>
    <style>
      :root {
        color-scheme: light;
        background: #020617;
      }

      body {
        margin: 0;
        background: #020617;
      }

      #app-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 24%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
        color: #e2e8f0;
        transition: opacity 180ms ease;
      }

      html[data-app-ready="true"] #app-boot {
        opacity: 0;
        pointer-events: none;
      }

      .app-boot__mark {
        display: inline-flex;
        height: 4rem;
        width: 4rem;
        align-items: center;
        justify-content: center;
        border-radius: 1.4rem;
        background: linear-gradient(135deg, #38bdf8 0%, #22d3ee 100%);
        color: #020617;
        font: 700 1.4rem/1 Inter, sans-serif;
        box-shadow: 0 20px 40px rgba(8, 145, 178, 0.26);
      }

      .app-boot__label {
        margin-top: 1rem;
        text-align: center;
        font: 600 0.9rem/1.5 Inter, sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body class="bg-slate-950">
    <div id="app-boot" aria-hidden="true">
      <div>
        <div class="app-boot__mark">I</div>
        <div class="app-boot__label">INDDIA ERP</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
